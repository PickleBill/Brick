<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bill Bricker — AI-Forward Sales · two directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#08090a;--panel:#101012;--line:rgba(255,255,255,.10);--line2:rgba(255,255,255,.18);
    --ink:#f4f6f7;--mute:#9aa0a8;--faint:#666d74;--mint:#6fefb4;--mint2:#4cc890;
    --green:#5be8a0;--cyan:#36c6e0;--violet:#8b7cf0;--coral:#ff8a6b;
    --spectrum:linear-gradient(100deg,#5be8a0 0%,#36c6e0 33%,#8b7cf0 66%,#ff8a6b 100%);
    --disp:'Bricolage Grotesque',system-ui,sans-serif;--body:'Hanken Grotesk',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);display:flex;flex-direction:column;overflow:hidden}
  .spectrum{background:var(--spectrum);-webkit-background-clip:text;background-clip:text;color:transparent}
  .mono{font-family:var(--mono)}

  /* control bar */
  .bar{flex:0 0 auto;display:flex;align-items:center;gap:18px;padding:14px 22px;border-bottom:1px solid var(--line);background:rgba(8,9,10,.8);backdrop-filter:blur(14px);z-index:10;flex-wrap:wrap}
  .bar .title{display:flex;flex-direction:column;gap:2px;margin-right:auto}
  .bar .eb{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--mint2)}
  .bar .title h1{font-family:var(--disp);font-size:18px;font-weight:700;letter-spacing:-.02em}
  .seg{display:flex;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:99px;padding:3px}
  .seg button{font-family:var(--mono);font-size:12px;color:var(--mute);background:none;border:none;padding:8px 16px;border-radius:99px;cursor:pointer;transition:.15s;white-space:nowrap}
  .seg button:hover{color:var(--ink)}
  .seg button.on{color:#08090a;background:var(--ink);font-weight:600}
  .hint{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.02em}
  @media(max-width:760px){.hint{display:none}.bar{gap:12px;padding:12px 16px}.bar .title h1{font-size:15px}}

  /* stage */
  .stage{flex:1 1 auto;display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:14px;min-height:0}
  .stage.focus-a{grid-template-columns:1fr 0fr}
  .stage.focus-b{grid-template-columns:0fr 1fr}
  @media(max-width:860px){
    .stage{grid-template-columns:1fr;grid-template-rows:1fr 1fr;overflow-y:auto}
    .stage.focus-a,.stage.focus-b{grid-template-columns:1fr}
    .stage.focus-a{grid-template-rows:1fr 0fr}
    .stage.focus-b{grid-template-rows:0fr 1fr}
  }

  .panel{position:relative;display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;min-width:0;min-height:0;transition:.35s cubic-bezier(.22,.61,.36,1)}
  .stage.focus-a .panel.b,.stage.focus-b .panel.a{opacity:0;pointer-events:none;border-width:0}
  .phead{flex:0 0 auto;display:flex;align-items:center;gap:11px;padding:11px 16px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.015)}
  .ptag{font-family:var(--mono);font-size:11px;font-weight:600;color:#08090a;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:6px;flex-shrink:0}
  .panel.a .ptag{background:var(--mint)}
  .panel.b .ptag{background:var(--violet)}
  .pname{font-family:var(--disp);font-size:15px;font-weight:700;letter-spacing:-.01em}
  .pdesc{font-family:var(--mono);font-size:10.5px;color:var(--faint);letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  @media(max-width:560px){.pdesc{display:none}}
  .popen{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--mute);border:1px solid var(--line2);padding:6px 12px;border-radius:99px;text-decoration:none;transition:.15s;white-space:nowrap}
  .popen:hover{color:var(--mint);border-color:var(--mint)}
  .frame{flex:1 1 auto;min-height:0;position:relative;background:var(--bg)}
  .frame iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:block}
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#08090a">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="sp" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#5be8a0"/><stop offset="50%" stop-color="#8b7cf0"/><stop offset="100%" stop-color="#ff8a6b"/></linearGradient></defs>
    <rect width="1200" height="800" fill="#08090a"/>
    <rect x="150" y="200" width="420" height="400" rx="20" fill="none" stroke="url(#sp)" stroke-width="4"/>
    <rect x="630" y="200" width="420" height="400" rx="20" fill="none" stroke="url(#sp)" stroke-width="4"/>
    <text x="600" y="690" font-family="monospace" font-size="34" fill="#6a7178" text-anchor="middle" letter-spacing="5">TWO DIRECTIONS</text>
  </svg>
</template>

<div class="bar">
  <div class="title">
    <span class="eb">Bill Bricker · AI-Forward Sales</span>
    <h1>Two directions, one narrative — <span class="spectrum">side by side</span></h1>
  </div>
  <div class="seg" id="seg">
    <button data-v="split" class="on">Side&nbsp;by&nbsp;side</button>
    <button data-v="a">Console</button>
    <button data-v="b">Dossier</button>
  </div>
  <div class="hint">Both are live — type in the terminals, hover the bars, drop a headshot.</div>
</div>

<div class="stage" id="stage">
  <div class="panel a">
    <div class="phead">
      <span class="ptag">A</span>
      <div style="min-width:0">
        <div class="pname">Console</div>
        <div class="pdesc">terminal-led · the OS metaphor up front</div>
      </div>
      <a class="popen" href="console-ai-forward.html" target="_blank">Open ↗</a>
    </div>
    <div class="frame"><iframe src="console-ai-forward.html" title="Console direction" loading="eager"></iframe></div>
  </div>
  <div class="panel b">
    <div class="phead">
      <span class="ptag">C</span>
      <div style="min-width:0">
        <div class="pname">Dossier</div>
        <div class="pdesc">portrait-forward · premium operator ID</div>
      </div>
      <a class="popen" href="dossier-ai-forward.html" target="_blank">Open ↗</a>
    </div>
    <div class="frame"><iframe src="dossier-ai-forward.html" title="Dossier direction" loading="eager"></iframe></div>
  </div>
</div>

<script>
  const stage = document.getElementById('stage');
  const seg = document.getElementById('seg');
  seg.addEventListener('click', (e) => {
    const btn = e.target.closest('button'); if (!btn) return;
    seg.querySelectorAll('button').forEach((b) => b.classList.toggle('on', b === btn));
    stage.classList.remove('focus-a', 'focus-b');
    if (btn.dataset.v === 'a') stage.classList.add('focus-a');
    else if (btn.dataset.v === 'b') stage.classList.add('focus-b');
  });
</script>
</body>
</html>
