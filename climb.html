<style>
  :root{
    --paper:#efe3c4;--paper2:#e6d6a8;--vellum:#f5ebd0;--sky:#f7eed5;
    --ink:#2b1f10;--ink2:#4a3a1f;--mute:#7a6a48;--rule:rgba(43,31,16,.16);
    --sienna:#a8421d;--sienna-deep:#6e2a12;--ochre:#d68a2a;--moss:#5e7a2a;
    --hand:"Caveat",cursive;--serif:"Spectral",Georgia,serif;--mono:"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--serif);line-height:1.5;
    background:radial-gradient(ellipse at 30% 0%, var(--sky) 0%, var(--paper) 55%, var(--paper2) 100%)}
  ::selection{background:var(--ink);color:var(--paper)}
  a{color:inherit}
  .wrap{max-width:1040px;margin:0 auto;padding:0 24px}

  nav{position:sticky;top:0;z-index:60;background:rgba(245,238,213,.92);backdrop-filter:blur(8px);border-bottom:.5px solid var(--rule)}
  nav .wrap{display:flex;align-items:center;justify-content:space-between;height:56px}
  .brand{font-style:italic;font-weight:500;font-size:19px;text-decoration:none;white-space:nowrap}
  .brand .pk{font-style:normal;font-size:18px;filter:drop-shadow(0 0 5px rgba(168,66,29,.5))}
  .nl{display:flex;gap:5px;align-items:center;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase}
  .nl a{color:var(--mute);text-decoration:none;transition:.15s;padding:7px 11px;border-radius:7px}
  .nl a:hover{color:var(--sienna)}
  .nl a.here{color:var(--paper);background:var(--ink)}
  .nl a.email{border:.5px solid var(--ink);color:var(--ink)}
  @media(max-width:600px){nav .wrap{flex-direction:column;height:auto;gap:7px;padding:9px 0 11px}.nl{gap:2px;font-size:10px}.nl a{padding:6px 9px}}

  header{text-align:center;padding:30px 0 6px}
  .eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--mute)}
  h1{font-style:italic;font-weight:300;font-size:clamp(34px,7vw,56px);line-height:.98;letter-spacing:-.025em;margin:8px 0 0}
  h1 em{font-style:normal;color:var(--sienna)}
  .deck{font-size:14px;font-style:italic;color:var(--ink2);margin:10px auto 0}
  .hint{font-family:var(--hand);color:var(--sienna);font-size:18px;margin-top:8px}

  .scwrap{position:relative}
  .scwrap::before,.scwrap::after{content:"";position:absolute;top:0;bottom:14px;width:42px;z-index:5;pointer-events:none;transition:opacity .3s}
  .scwrap::before{left:0;background:linear-gradient(90deg,var(--paper),transparent)}
  .scwrap::after{right:0;background:linear-gradient(-90deg,var(--paper),transparent)}
  .edge{position:absolute;top:50%;transform:translateY(-50%);z-index:6;width:38px;height:38px;border-radius:50%;
    background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;
    font-size:22px;line-height:1;cursor:pointer;box-shadow:0 4px 14px rgba(43,31,16,.35);transition:opacity .3s;user-select:none}
  .edge.l{left:10px}.edge.r{right:10px;animation:nudge 2s ease-in-out infinite}
  @keyframes nudge{0%,100%{transform:translateY(-50%) translateX(0)}50%{transform:translateY(-50%) translateX(5px)}}
  .edge.off{opacity:0;pointer-events:none}
  /* full-bleed horizontal scroller */
  .scroller{width:100vw;margin-left:calc(50% - 50vw);overflow-x:auto;overflow-y:hidden;
    -webkit-overflow-scrolling:touch;scrollbar-width:thin;padding:6px 0 14px;cursor:grab}
  .scroller.drag{cursor:grabbing}
  .scroller::-webkit-scrollbar{height:8px}.scroller::-webkit-scrollbar-thumb{background:rgba(43,31,16,.25);border-radius:99px}
  /* fixed-size canvas — full-bleed, scroll to see the whole ascent */
  .canvas{position:relative;width:1240px;height:min(72vh,560px);margin:0 auto}
  .canvas svg.scene{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  .marg{position:absolute;font-family:var(--hand);color:var(--sienna);font-size:18px;line-height:1;pointer-events:none;white-space:nowrap}
  .xtick{position:absolute;bottom:2px;transform:translateX(-50%);font-family:var(--mono);font-size:10px;color:var(--mute)}
  .xtick.now{color:var(--sienna);font-weight:600}

  .pin{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:3;text-align:center}
  .pin .med{width:50px;height:50px;border-radius:50%;background:var(--vellum);border:2px solid var(--ink);
    display:flex;align-items:center;justify-content:center;margin:0 auto;position:relative;
    box-shadow:0 3px 9px rgba(43,31,16,.22);transition:transform .22s,box-shadow .22s}
  .pin .med .mono{font-family:var(--mono);font-weight:600;font-size:13px;letter-spacing:-.02em;color:var(--ink)}
  .pin .med .gly{font-size:22px}
  .pin .med::after{content:"";position:absolute;inset:-6px;border-radius:50%;border:1.5px solid var(--sienna);opacity:0;animation:halo 2.8s ease-in-out infinite}
  @keyframes halo{0%,100%{opacity:0;transform:scale(.85)}50%{opacity:.5;transform:scale(1.08)}}
  .pin:hover .med{transform:scale(1.16);box-shadow:0 6px 16px rgba(168,66,29,.35)}
  .pin.side .med{border-color:var(--ochre);background:#f7eecb}.pin.side .mono{color:var(--sienna-deep)}
  .pin.personal .med{border-color:var(--moss)}.pin.personal .mono{color:var(--moss)}
  .pin.live .med{border-color:var(--sienna)}.pin.live .mono{color:var(--sienna)}
  .pin.live .med::after{border-color:var(--sienna);animation:haloLive 1.9s ease-in-out infinite}
  @keyframes haloLive{0%,100%{opacity:.25;transform:scale(.9);box-shadow:0 0 0 0 rgba(168,66,29,.4)}50%{opacity:.85;transform:scale(1.14);box-shadow:0 0 24px 4px rgba(168,66,29,.28)}}
  .pin .lbl{font-family:var(--serif);font-style:italic;font-weight:500;font-size:13px;color:var(--ink);
    background:rgba(245,236,214,.92);border:.5px solid rgba(43,31,16,.35);padding:2px 7px;border-radius:2px;
    margin-top:6px;white-space:nowrap;display:inline-block;line-height:1.2}
  .pin .lbl .y{display:block;font-family:var(--mono);font-style:normal;font-size:8.5px;color:var(--mute)}
  .pin.above{display:flex;flex-direction:column}.pin.above .lbl{margin-top:0;margin-bottom:6px;order:-1}

  .climbfoot{text-align:center;padding:14px 0 64px}
  .climbfoot .hand{font-family:var(--hand);color:var(--sienna);font-size:22px}
  .climbfoot .ctas{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin-top:14px}
  .btn{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;padding:11px 18px;border:.5px solid var(--ink);color:var(--ink);text-decoration:none;transition:.15s}
  .btn:hover{background:var(--vellum)}.btn.primary{background:var(--ink);color:var(--paper)}

  .scrim{position:fixed;inset:0;z-index:95;background:rgba(43,31,16,.46);backdrop-filter:blur(2px);display:none;align-items:flex-end;justify-content:center}
  .scrim.on{display:flex}
  @media(min-width:640px){.scrim{align-items:center;padding:24px}}
  .card{width:min(560px,100%);max-height:88vh;overflow:auto;background:linear-gradient(180deg,#f7eed5,#efe2bf);border:.5px solid var(--ink);box-shadow:0 -10px 40px rgba(43,31,16,.4);padding:30px 24px 26px;position:relative;animation:up .3s cubic-bezier(.3,.7,.4,1)}
  @media(min-width:640px){.card{border-radius:2px}}
  @keyframes up{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
  .card .tape{position:absolute;top:-11px;left:50%;width:90px;height:20px;transform:translateX(-50%) rotate(-2deg);background:repeating-linear-gradient(90deg,rgba(214,138,42,.7) 0 5px,rgba(214,138,42,.45) 5px 9px)}
  .card .close{position:absolute;top:12px;right:16px;background:none;border:none;cursor:pointer;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute)}
  .card .lane{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute)}
  .card h2{font-style:italic;font-weight:500;font-size:31px;line-height:1.02;letter-spacing:-.02em;margin:6px 0 4px}
  .card .period{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--sienna);margin-bottom:14px}
  .card .pull{font-style:italic;font-size:17px;line-height:1.35;border-left:2px solid var(--sienna);padding:3px 0 3px 14px;margin:6px 0 16px}
  .card p{font-size:14.5px;color:var(--ink2);line-height:1.6;margin:0 0 11px}.card p em{font-style:italic;color:var(--ink)}
  .card .actions{margin-top:14px;padding-top:13px;border-top:.5px dotted var(--rule);display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
  .card .actions a.lnk{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--sienna);text-decoration:underline;text-underline-offset:3px}
  .card .nav-btns{display:flex;gap:10px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute)}
  .card .nav-btns button{background:none;border:none;cursor:pointer;color:inherit;font:inherit}
</style>
</head>
<body>

<header><div class="wrap">

<div class="scwrap">

<div class="scroller" id="scroller">
  <div class="canvas" id="canvas">
    <svg class="scene" viewBox="0 0 1240 560" preserveAspectRatio="xMidYMid meet">

        <linearGradient id="rf" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a8421d" stop-opacity=".2"/><stop offset="70%" stop-color="#a8421d" stop-opacity=".05"/><stop offset="100%" stop-color="#a8421d" stop-opacity="0"/></linearGradient>
      </defs>
      <g stroke="#a8421d" stroke-opacity=".15" stroke-width=".75" fill="none">
        <path d="M0 470 Q320 460 640 464 T1240 456"/><path d="M0 390 Q320 376 640 380 T1240 360"/>
        <path d="M0 310 Q320 292 640 296 T1240 270"/><path d="M0 220 Q320 200 640 202 T1240 168"/>
      </g>
      <path d="M110 440 L250 386 L330 350 L410 332 L600 282 L690 234 L950 140 L950 540 L110 540 Z" fill="url(#rf)"/>
      <path d="M110 440 L250 386 L330 350 L410 332 L600 282 L690 234 L950 140" fill="none" stroke="#2b1f10" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
      <path d="M950 140 L1050 112 L1180 80" fill="none" stroke="#5e7a2a" stroke-width="1.8" stroke-dasharray="3 8" stroke-linecap="round"/>
      <path d="M110 440 L250 386 L330 350 L410 332 L600 282 L690 234 L950 140" fill="none" stroke="#a8421d" stroke-width="1.4" stroke-dasharray="1 6" stroke-linecap="round"/>
    </svg>

    <div class="marg" style="left:150px;top:424px;transform:rotate(-3deg)">doors &amp; dials</div>
        <div class="marg" style="left:1000px;top:66px;transform:rotate(2deg)">summit unset.</div>

    <div class="xtick" style="left:110px">2006</div><div class="xtick" style="left:330px">2012</div>
    <div class="xtick" style="left:600px">2017</div><div class="xtick now" style="left:950px">2023 · now</div>

    <div id="pins"></div>
  </div>
</div>
</div>

<div class="climbfoot">
  <div class="hand">summit unset. still walking ↗</div>
  <div class="ctas">
    <a class="btn primary" href="work.html">See the work →</a>
    <a class="btn" href="resume-v2.html">Résumé</a>
    <a class="btn" href="mailto:bricker3@gmail.com">Email Bill</a>
  </div>
</div>

<div class="scrim" id="scrim" onclick="if(event.target===this)closeCard()">
  <article class="card"><span class="tape"></span><button class="close" onclick="closeCard()">close ✕</button>
    <div class="lane" id="cLane"></div><h2 id="cTitle"></h2><div class="period" id="cPeriod"></div><div class="pull" id="cPull"></div><div id="cBody"></div>
    <div class="actions"><span id="cLink"></span><div class="nav-btns"><button onclick="step(-1)">◂ prev</button><button onclick="step(1)">next ▸</button></div></div>
  </article>
</div>

<script>
const N=[
 {x:110,y:440,pos:"below",lane:"career",mono:"NM",laneLabel:"Origin · 2006",title:"Northwestern Mutual",yr:"2006",period:"2006 · cold-call school",pull:"The most concentrated lesson in selling I ever got.",body:["Doors and dials out of college — top 10 nationally, $6M+ TCV across 150+ accounts. Grateful for it the way you're grateful for a hard winter."],link:null},
 {x:250,y:386,pos:"below",lane:"career",mono:"UNC",laneLabel:"Study · 2010",title:"UNC Kenan-Flagler",yr:"2010 · MBA",period:"2010 · MBA · GMAT 730",pull:"Where I stopped confusing activity with progress.",body:["Two years to learn what a P&amp;L is for — and to meet the people who'd show up on this map a dozen more times."],link:null},
 {x:330,y:350,pos:"below",lane:"career",mono:"IBM",laneLabel:"Sell · the foundation",title:"IBM / Netezza",yr:"2012–14",period:"2012–14 · seven-figure deals",pull:"You cannot out-build the need to talk to a customer.",body:["High-six-figure analytics deals with <em>Zillow</em> &amp; <em>Avalara</em>, part of an 8-figure McKesson deal, &gt;100% of quota — Big Data into the Fortune 500."],link:{u:"work.html",t:"enterprise GTM →"}},
 {x:410,y:332,pos:"below",lane:"career",mono:"Wd",laneLabel:"Sell · 2014",title:"WibiData",yr:"2014",period:"2014 · Director of Sales",pull:"Selling into a problem the customer hasn't named yet.",body:["F500 Big Data pilots — <em>Macy's</em>, <em>Nordstrom</em> — at an NEA/Canaan/Eric-Schmidt-backed startup."],link:null},
 {x:600,y:282,pos:"below",lane:"career",mono:"GL",laneLabel:"Sell · 2017",title:"GearLaunch",yr:"2017",period:"2017 · VP Sales &amp; Marketing",pull:"Creator commerce, before it had a name.",body:["The proving ground for the operator muscle that ran Dreamship next."],link:null},
 {x:690,y:234,pos:"below",lane:"career",mono:"DS",laneLabel:"Build · the big one",title:"Dreamship",yr:"2018–25",period:"2018–25 · cofounder &amp; CEO",pull:"Zero to $35M+ — and 11x in a single year.",body:["Led as CEO to <em>$35M+ revenue</em>, ~$85M GMV, 2.3M+ units — <em>11x in one year</em> — on $2.2M raised.","Sold <em>Google</em> as a sub-1-yr-old startup: an 8-figure channel that ran 5+ years; then Stripe, PayPal, Meta &amp; Payoneer off it."],link:{u:"https://dreamship.com",t:"dreamship.com ↗"}},
 {x:950,y:140,pos:"below",lane:"live",mono:"C",laneLabel:"Now shipping · live",title:"Courtana",yr:"2023 → now",period:"2023 → now · founder / CEO",pull:"AI smart-court tech for the people who run the room.",body:["$350K raised; concept to <em>36 courts live or piloting</em>, with a 44-court LOI. Ran the whole zero-to-one loop solo."],link:{u:"https://courtana.com",t:"courtana.com ↗"}},
 {x:470,y:262,pos:"above",lane:"side",gly:"✎",laneLabel:"Field note · 2015",title:"Networking Manifesto",yr:"2015",period:"2015 · essay · still operative",pull:"“Who can I introduce you to so you can achieve your goals?”",body:["The question I've opened nearly every working conversation with for a decade. The river of intros is the longest line on my map."],link:null},
 {x:540,y:246,pos:"above",lane:"side",gly:"♠",laneLabel:"Play · 2016",title:"GroupOrDare",yr:"2016",period:"2016 · party card game",pull:"I shipped a party card game. It exists. It works.",body:["My kids think it's the most impressive thing I've done — the correct ranking. Evidence beats résumé."],link:null},
 {x:1095,y:108,pos:"above",lane:"side",gly:"⚙",laneLabel:"The engine · 2026",title:"VibeCo",yr:"2026",period:"2026 · 11-agent simulator",pull:"The workshop the rest of these came out of.",body:["11 AI agents: idea → brief → build → art. The engine behind 40+ apps across 31 repos."],link:{u:"https://vibeco.lovable.app/simulate",t:"run it ↗"}},
 {x:1150,y:162,pos:"below",lane:"side",mono:"P",laneLabel:"Tech proof · 2026",title:"Pickle DaaS",yr:"2026",period:"2026 · data warehouse from video",pull:"20K+ clips at $0.0054 each.",body:["A self-serve sports-data warehouse from raw video — Supabase, connectors, autonomous agents. The model isn't the moat; the math is."],link:{u:"https://picklebill.github.io/pickle-daas-data/dashboards/showcase-portal-v4.html",t:"dashboards ↗"}},
 {x:250,y:512,pos:"below",lane:"personal",gly:"♥",laneLabel:"Home base",title:"Home · three kids",yr:"ongoing",period:"ongoing · the why",pull:"The reason any of this matters.",body:["Three kids. A real kitchen and an unreal amount of pickleball gear in the garage. The climb exists to support this."],link:null},
 {x:880,y:512,pos:"below",lane:"personal",gly:"↑",laneLabel:"The long walk",title:"The Long Walk",yr:"2023 → now",period:"2023 → now · still walking",pull:"Cancer, 2023. The pipeline didn't stop. Neither did I.",body:["Twelve weeks of chemo; the pipeline kept moving. I leave this here because no one I'd want to work with would want it left out."],link:{u:"mailto:bricker3@gmail.com",t:"write me ↗"}},
];
document.getElementById('pins').innerHTML=N.map((n,i)=>{
 const emb=n.gly?`<span class="gly">${n.gly}</span>`:`<span class="mono">${n.mono}</span>`;
 // y in 560-tall design space → percentage of canvas height
 return `<div class="pin ${n.lane} ${n.pos}" style="left:${n.x}px;top:${(n.y/560*100)}%" data-i="${i}"><div class="med">${emb}</div><span class="lbl">${n.title}<span class="y">${n.yr}</span></span></div>`;
}).join('');
let openI=null;
function openCard(i){const n=N[i];if(!n)return;openI=i;
 document.getElementById('cLane').innerHTML=n.laneLabel;document.getElementById('cTitle').innerHTML=n.title;
 document.getElementById('cPeriod').innerHTML=n.period;document.getElementById('cPull').innerHTML=n.pull;
 document.getElementById('cBody').innerHTML=n.body.map(p=>`<p>${p}</p>`).join('');
 document.getElementById('cLink').innerHTML=n.link?`<a class="lnk" href="${n.link.u}" ${n.link.u.startsWith('http')?'target="_blank" rel="noopener"':''}>${n.link.t}</a>`:'<span></span>';
 document.getElementById('scrim').classList.add('on');}
function closeCard(){document.getElementById('scrim').classList.remove('on');openI=null}
function step(d){if(openI===null)return;openCard((openI+d+N.length)%N.length)}
window.closeCard=closeCard;window.step=step;
document.querySelectorAll('.pin').forEach(p=>p.addEventListener('click',()=>openCard(+p.dataset.i)));
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeCard();if(document.getElementById('scrim').classList.contains('on')){if(e.key==='ArrowRight')step(1);if(e.key==='ArrowLeft')step(-1);}});
// start at the beginning + edge cues + drag-to-pan
const sc=document.getElementById('scroller');
const eL=document.getElementById('edgeL'),eR=document.getElementById('edgeR');
function edges(){const max=sc.scrollWidth-sc.clientWidth-4;
  eL.classList.toggle('off',sc.scrollLeft<=4);
  eR.classList.toggle('off',sc.scrollLeft>=max);}
sc.scrollLeft=0;edges();
sc.addEventListener('scroll',edges);window.addEventListener('resize',edges);
eL.onclick=()=>sc.scrollBy({left:-sc.clientWidth*.7,behavior:'smooth'});
eR.onclick=()=>sc.scrollBy({left:sc.clientWidth*.7,behavior:'smooth'});
let down=false,sx=0,sl=0;
sc.addEventListener('pointerdown',e=>{if(e.target.closest('.pin'))return;down=true;sx=e.clientX;sl=sc.scrollLeft;sc.classList.add('drag')});
sc.addEventListener('pointermove',e=>{if(down)sc.scrollLeft=sl-(e.clientX-sx)});
addEventListener('pointerup',()=>{down=false;sc.classList.remove('drag')});
</script>
</body>
