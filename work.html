<style>
  :root{
    --bg:#08090a;--bg2:#0c0e10;--panel:#101316;
    --glass:rgba(255,255,255,.05);--line:rgba(255,255,255,.10);--line2:rgba(255,255,255,.18);
    --text:#f4f2ec;--mute:#9aa0a3;--faint:#5c6164;
    --sage:#a8c98e;--coral:#e69270;--blue:#7fb0e8;--green:#86e0a4;--amber:#e6b86e;--cream:#f3ecdc;
    --term:#d8ddd6;
    --sans:'Hanken Grotesk',system-ui,sans-serif;--disp:'Bricolage Grotesque','Hanken Grotesk',sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  h1,.brand{font-family:var(--disp)}
  ::selection{background:var(--sage);color:#08090a}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1000px;margin:0 auto;padding:0 22px;position:relative;z-index:2}
  .mesh{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.42;mix-blend-mode:screen}
  .b1{width:600px;height:600px;background:radial-gradient(circle,#2f6f7a,transparent 65%);top:-180px;right:-140px;animation:drift 24s ease-in-out infinite}
  .b2{width:520px;height:520px;background:radial-gradient(circle,#6a7a44,transparent 65%);top:520px;left:-160px;animation:drift2 28s ease-in-out infinite}
  @keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(-50px,40px) scale(1.1)}}
  @keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,-30px) scale(1.08)}}

  /* ===== consistent nav (identical across site) ===== */
  nav{position:sticky;top:0;z-index:50;background:rgba(8,9,10,.7);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06)}
  nav .wrap{display:flex;align-items:center;justify-content:space-between;height:60px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:16px;letter-spacing:-.01em;white-space:nowrap;flex-shrink:0}
  .brand .pk{font-size:20px;line-height:1;animation:pkpulse 3s ease-in-out infinite}
  @keyframes pkpulse{0%,100%{filter:drop-shadow(0 0 4px rgba(134,224,164,.55))}50%{filter:drop-shadow(0 0 10px rgba(134,224,164,.95))}}

  .nl{display:flex;gap:4px;align-items:center;font-size:13px;color:var(--mute)}
  .nl a{padding:7px 12px;border-radius:99px;transition:.15s}
  .nl a:hover{color:var(--text);background:rgba(255,255,255,.05)}
  .nl a.here{color:#08090a;background:var(--cream);font-weight:600}
  .nl a.email{color:#08090a;background:var(--cream);font-weight:600}
  @media(max-width:600px){nav .wrap{flex-direction:column;height:auto;gap:8px;padding-top:9px;padding-bottom:11px}.nl{gap:3px;font-size:12px}.nl a{padding:7px 11px}}

  /* hero */
  .top{padding:14px 0 2px;text-align:center}
  .kick{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute);border:1px solid var(--line);padding:7px 13px;border-radius:99px;background:var(--glass)}
  .kick .dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(134,224,164,.5)}70%{box-shadow:0 0 0 9px transparent}100%{box-shadow:0 0 0 0 transparent}}
  h1{font-size:clamp(30px,5.4vw,46px);font-weight:800;letter-spacing:-.03em;margin:16px 0 0;line-height:1.04}
  h1 .g{background:linear-gradient(100deg,var(--sage),var(--coral));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sub{font-size:15px;color:var(--mute);margin:12px auto 0;max-width:48ch}

  /* terminal */
  .term{margin:8px auto 14px;border-radius:16px;border:1px solid var(--line);overflow:hidden;
    background:linear-gradient(180deg,#0d0f12,#0a0c0e);box-shadow:0 40px 90px -40px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.05)}
  .tbar{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.02);flex-wrap:nowrap;overflow:hidden}
  .tbar .dots{display:flex;gap:7px}.tbar .dots i{width:11px;height:11px;border-radius:50%}
  .tbar .dots .r{background:#ff5f57}.tbar .dots .y{background:#febc2e}.tbar .dots .g{background:#28c840}
  .tbar .ttl{font-family:var(--mono);font-size:11.5px;color:var(--mute);letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  @media(max-width:560px){.tbar .live{display:none}}
  .tbar .live{margin-left:auto;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--green);display:flex;align-items:center;gap:6px}
  .tbar .live i{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.8s infinite}
  .screen{height:min(60vh,520px);overflow-y:auto;padding:18px 18px 8px;font-family:var(--mono);font-size:13.5px;line-height:1.65;color:var(--term);scroll-behavior:smooth}
  .screen::-webkit-scrollbar{width:8px}.screen::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:99px}
  @media(max-width:560px){.screen{font-size:12.5px;height:62vh}}
  .ln{padding:1px 0;white-space:pre-wrap;word-break:break-word}
  .echo{color:var(--text)}.echo .p{color:var(--green)}.echo .c{color:var(--sage)}
  .cmt{color:var(--faint)}
  .h{color:var(--text);font-weight:600;font-family:var(--sans);font-size:16px;display:block;margin:4px 0 2px}
  .key{color:var(--blue)}.val{color:var(--term)}.ok{color:var(--green)}.warn{color:var(--amber)}.pink{color:var(--coral)}
  .lnk{color:var(--sage);border-bottom:1px solid rgba(168,201,142,.4)}.lnk:hover{color:#cfe6b8}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .reveal{opacity:0;transform:translateY(6px);animation:rin .32s forwards}
  @keyframes rin{to{opacity:1;transform:none}}
  .cur{display:inline-block;width:8px;height:15px;background:var(--green);vertical-align:-2px;animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:0}}

  /* input bar */
  .ibar{display:flex;align-items:center;gap:9px;padding:12px 15px;border-top:1px solid var(--line);background:rgba(255,255,255,.02)}
  .ibar .pr{font-family:var(--mono);font-size:13.5px;color:var(--green);flex-shrink:0}
  .ibar input{flex:1;background:transparent;border:none;outline:none;font-family:var(--mono);font-size:13.5px;color:var(--text);caret-color:var(--green)}
  .ibar input::placeholder{color:var(--faint)}
  .ibar .run{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);border:1px solid var(--line);padding:5px 9px;border-radius:6px;flex-shrink:0}

  /* command marquee */
  .cmdwrap{margin:0 0 10px}
  .cmdlbl{text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--sage);margin-bottom:8px;animation:bob 2.4s ease-in-out infinite}
  @keyframes bob{0%,100%{opacity:.65}50%{opacity:1}}
  .cmdbar{overflow:hidden;-webkit-mask:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent);mask:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent)}
  .cmdrow{display:flex;gap:8px;width:max-content;animation:marq 34s linear infinite}
  .cmdrow.r2{animation-duration:40s;animation-direction:reverse;margin-top:8px}
  .cmdbar:hover .cmdrow{animation-play-state:paused}
  @keyframes marq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .chip{font-family:var(--mono);font-size:11.5px;color:var(--mute);border:1px solid var(--line);background:var(--glass);padding:7px 13px;border-radius:99px;cursor:pointer;transition:.15s;white-space:nowrap;flex-shrink:0}
  .chip:hover{color:#08090a;background:var(--sage);border-color:transparent}
  .chip:hover .s{color:#08090a}
  .chip .s{color:var(--green)}
  .chip.glow{border-color:var(--green);box-shadow:0 0 12px rgba(134,224,164,.45);animation:gp 2.2s ease-in-out infinite}
  @keyframes gp{0%,100%{box-shadow:0 0 7px rgba(134,224,164,.3)}50%{box-shadow:0 0 16px rgba(134,224,164,.65)}}
  .flash{animation:flash .8s ease}
  @keyframes flash{0%{background:rgba(134,224,164,.16)}100%{background:transparent}}
  .cur{display:inline-block;width:9px;height:15px;background:var(--green);vertical-align:-2px;animation:blink 1s steps(2) infinite}

  footer{text-align:center;color:var(--faint);font-size:12px;font-family:var(--mono);padding:10px 0 60px;letter-spacing:.04em}
  footer a{color:var(--mute)}
</style>
</head>

 {k:['lab','anthropic','openai','frontier','why now','why a lab','join'],r:`<span class="h">why a frontier lab, why now</span>Because the gap I fill is the one labs feel most: people who can stand in front of an enterprise buyer <em>and</em> have personally shipped with the technology. I've sold the hardest room there is (Google, as a no-name startup) and I build with AI every single day. I want to do my best work where the frontier is actually being made.`},

 {k:['dreamship','fulfillment','print'],r:`<span class="h">dreamship, short version</span>Cofounded, led as CEO: zero → $35M+, 11x in one year, on $2.2M raised. EBITDA-profitable 4 of 8 years. Closed Google as a partner, then sequenced Stripe/PayPal/Meta/Payoneer off it. Type <span class="key">companies</span> for links.`},

function localAnswer(q,echoed){
  const ql=q.toLowerCase();let best=null,bs=0;
  QA.forEach(a=>{let sc=0;a.k.forEach(k=>{if(ql.includes(k))sc++});if(sc>bs){bs=sc;best=a}});
  if(best){print(best.r,echoed?undefined:q);return;}
  print(`<span class="h">good question.</span>I don't have a canned answer for that — which probably means it deserves a real conversation.\n<span class="cmt">// try</span> <span class="key">help</span> <span class="cmt">for what I can answer here, or email</span> <a class="lnk" href="mailto:bricker3@gmail.com">bricker3@gmail.com</a> <span class="cmt">and ask me directly.</span>`,echoed?undefined:q);
}

// ─ real LLM brain (ask-bill edge function, vibeco Supabase) ─
const ASK_ENDPOINT='https://ulgoahsxkrkzoquvntei.supabase.co/functions/v1/ask-bill';
const HIST=[];
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function echoLine(q){
  const e=document.createElement('div');e.className='ln echo reveal flash';
  e.innerHTML=`<span class="p">➜ ~</span> <span class="c">${esc(q)}</span>`;
  screen.appendChild(e);screen.scrollTop=screen.scrollHeight;
}
function thinkLine(){
  const t=document.createElement('div');t.className='ln reveal';
  t.innerHTML='<span class="cmt">thinking</span><span class="cur"></span>';
  screen.appendChild(t);screen.scrollTop=screen.scrollHeight;return t;
}
async function answerQ(q){
  echoLine(q);
  const t=thinkLine();
  try{
    const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),20000);
    const r=await fetch(ASK_ENDPOINT,{method:'POST',signal:ctrl.signal,
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:q.slice(0,500),history:HIST.slice(-6)})});
    clearTimeout(to);
    const d=await r.json();
    if(!r.ok||!d.answer)throw new Error(d.error||r.status);
    t.remove();
    HIST.push({role:'user',content:q},{role:'assistant',content:d.answer});
    print(esc(d.answer).split(/\n+/).join('\n'));
  }catch(e){
    t.remove();
    localAnswer(q,true);
  }
}

function print(html,echo){
  if(echo!==undefined){
    const e=document.createElement('div');e.className='ln echo reveal flash';
    e.innerHTML=`<span class="p">➜ ~</span> <span class="c">${echo}</span>`;screen.appendChild(e);
  }
  const lines=html.split('\n');
  lines.forEach((l,i)=>{const d=document.createElement('div');d.className='ln reveal';d.style.animationDelay=(i*22)+'ms';d.innerHTML=l||'&nbsp;';screen.appendChild(d);});
  const sp=document.createElement('div');sp.className='ln';sp.innerHTML='&nbsp;';screen.appendChild(sp);
  screen.scrollTop=screen.scrollHeight;
}
function run(raw){
  const cmd=(raw||'').trim().toLowerCase();
  if(!cmd)return;
  const _w=document.getElementById('waiting');if(_w)_w.remove();
  if(cmd==='clear'||cmd==='cls'){screen.innerHTML='';boot(true);return;}
  if(cmd.startsWith('ask ')){answerQ(raw.trim().slice(4));return;}
  const key=ALIAS[cmd]||cmd;
  if(CMDS[key]){print(CMDS[key](),raw.trim());}
  else{answerQ(raw.trim());}
}
function boot(short){
  if(short){print('<span class="cmt">// cleared.</span>');return;}
  screen.innerHTML='';
  print("<span class='h' style='font-size:17px;margin-top:0'>Hi — I'm Bill's operating system.</span>"+
        "<span class='cmt'>20 years selling &amp; building · enterprise GTM · 3 startups · 40+ AI apps.</span>\n"+
        "<span class='cmt'>Tap a command — or ask me anything in plain English ↓</span>");
  const w=document.createElement('div');w.className='ln';w.id='waiting';
  w.innerHTML="<span class='p' style='color:var(--green)'>➜ ~</span> <span class='cur'></span>";
  screen.appendChild(w);
}
document.getElementById('form').addEventListener('submit',e=>{e.preventDefault();const i=document.getElementById('cmd');run(i.value);i.value='';});
const GLOW=['whoami','ask'];
function chip(c,l){return `<span class="chip${GLOW.includes(c)?' glow':''}" data-c="${c}"><span class="s">$</span> ${l}</span>`;}
const R1=[['whoami','whoami'],['ask','ask me anything'],['companies','companies'],['google-deal','google-deal'],['sales','sales-gtm']];
const R2=[['enterprise','enterprise'],['builds','builds'],['pickle','pickle-daas'],['ls','ls'],['stats','stats'],['git','git log'],['contact','contact']];
function fill(id,arr){const h=arr.map(([c,l])=>chip(c,l)).join('');document.getElementById(id).innerHTML=h+h;}
fill('row1',R1);fill('row2',R2);
document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{run(c.dataset.c);if(window.innerWidth>680)document.getElementById('cmd').focus();}));
// auto-run a command on load with a typewriter effect, then leave a fresh prompt
function typeRun(cmd){
  const _w=document.getElementById('waiting');if(_w)_w.remove();
  const e=document.createElement('div');e.className='ln echo reveal';
  e.innerHTML=`<span class="p">➜ ~</span> <span class="c" id="autotype"></span><span class="cur" id="autocur"></span>`;
  screen.appendChild(e);
  const span=e.querySelector('#autotype');
  const reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  let i=0;
  (function tick(){
    if(i<=cmd.length){span.textContent=cmd.slice(0,i++);screen.scrollTop=screen.scrollHeight;setTimeout(tick,reduce?0:60);}
    else{
      const c=document.getElementById('autocur');if(c)c.remove();
      const key=ALIAS[cmd]||cmd;
      if(CMDS[key])print(CMDS[key]());
      const w=document.createElement('div');w.className='ln';w.id='waiting';
      w.innerHTML="<span class='p' style='color:var(--green)'>➜ ~</span> <span class='cur'></span>";
      screen.appendChild(w);screen.scrollTop=screen.scrollHeight;
    }
  })();
}
boot();
// deep links (QR card / shares): /work.html?cmd=whoami or ?q=why+pickleball
const _qp=new URLSearchParams(location.search);
const _dc=_qp.get('cmd')||_qp.get('q');
if(_dc)setTimeout(()=>run(_dc),700);
else setTimeout(()=>typeRun('whoami'),600); // first fold is alive: auto-run whoami
