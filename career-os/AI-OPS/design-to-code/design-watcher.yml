# Design → Code Watcher  (INERT — move to .github/workflows/ to activate)
# Needs repo secret: ANTHROPIC_API_KEY. GITHUB_TOKEN is provided automatically.
name: design-to-code

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      handoff_url:
        description: "Claude Design handoff URL"
        required: true

permissions:
  contents: write        # create a branch + commit
  pull-requests: write   # open the draft PR
  issues: write          # comment back on the issue

jobs:
  implement:
    # Only run for the design-handoff label (or a manual dispatch)
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'design-handoff'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: career-os/AI-OPS/design-to-code
        run: npm install --no-audit --no-fund

      - name: Run Design→Code agent
        working-directory: career-os/AI-OPS/design-to-code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          DISPATCH_URL: ${{ github.event.inputs.handoff_url }}
        run: node run_design_to_code.mjs
